; Harbor Breeze Fan Control — ESP32 + 315 MHz TX only
; https://github.com/bttnns/harborBreeze315
;
; Build targets:
;   esp32c3       — full (transmitter + optional receiver for learn/debug)
;   esp32c3_tx    — transceiver only (no receiver; production build)

[platformio]
default_envs = esp32c3

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_filters = direct
board_build.filesystem = littlefs
extra_scripts = pre:extra_scripts/load_env.py
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  ESP32Async/AsyncTCP
  ESP32Async/ESPAsyncWebServer

[env:esp32c3_tx]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
monitor_filters = direct
board_build.filesystem = littlefs
extra_scripts = pre:extra_scripts/load_env.py
build_flags = -DTRANSCEIVER_ONLY=1
build_src_filter = "+<*> -<rf_capture.cpp>"
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.0
  ESP32Async/AsyncTCP
  ESP32Async/ESPAsyncWebServer
